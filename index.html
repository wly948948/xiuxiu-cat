<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); 
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        .bar-label { width: 45px; }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
            margin-left: 5px;
        }

        .pixel-bar-fill {
            height: 100%;
            background: #ff5e7e; 
            width: 60%;
            transition: width 0.3s;
        }
        #affection-bar { background: #ff2a85; }

        /* 精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        /* 像素 SVG */
        svg.cat-sprite {
            width: 170px;
            height: 170px;
            animation: breathe 3.5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }

        .emoji-effect {
            position: absolute;
            font-size: 28px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
        }

        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; 
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; 
            overflow-y: auto;
            flex-grow: 1;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; 
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active:not(:disabled) {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        /* 禁用时的像素置灰样式 */
        .pixel-btn:disabled {
            background: #a0828c !important;
            border-color: #5a4b40 !important;
            color: #605058 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-input:disabled {
            background: #2b231f;
            color: #887870;
            border-color: #3a2e26;
            cursor: not-allowed;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        #chat-submit:disabled {
            background: #904056;
            border-color: #602a3a;
            color: #b09098;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="game-console">
        <div id="game-screen">
            <!-- 状态面板 -->
            <div id="status-bars">
                <div class="bar-container">
                    <span class="bar-label">🐟 饱食</span>
                    <div class="pixel-bar-bg">
                        <div id="hunger-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <span class="bar-label">❤️ 好感</span>
                    <div class="pixel-bar-bg">
                        <div id="affection-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <!-- SVG 猫咪 -->
            <div id="sprite-container">
                <svg class="cat-sprite" viewBox="0 0 48 48">
                    <!-- 1. 尾巴 -->
                    <rect x="29" y="24" width="10" height="15" fill="#150b09" />
                    <rect x="30" y="25" width="8" height="13" fill="#35221e" />
                    <rect x="30" y="29" width="3" height="4" fill="#f2cab3" />
                    <rect x="33" y="27" width="4" height="3" fill="#35221e" />
                    <rect x="34" y="32" width="3" height="3" fill="#f2cab3" />

                    <!-- 2. 左耳朵 -->
                    <path d="M9 14 L15 6 L18 14 Z" fill="#150b09" />
                    <path d="M10 13 L14 7 L16 13 Z" fill="#35221e" />
                    <path d="M11 13 L13 9 L14 13 Z" fill="#ea8585" />

                    <!-- 3. 右耳朵 -->
                    <path d="M22 14 L25 6 L31 14 Z" fill="#150b09" />
                    <path d="M23 13 L26 7 L29 13 Z" fill="#35221e" />
                    <path d="M25 13 L27 9 L28 13 Z" fill="#ea8585" />

                    <!-- 4. 脑袋与脸颊 -->
                    <rect x="8" y="13" width="24" height="15" fill="#150b09" />
                    <rect x="9" y="14" width="22" height="13" fill="#35221e" />
                    <rect x="21" y="15" width="1" height="1" fill="#ffffff" />
                    <rect x="6" y="19" width="3" height="4" fill="#150b09" />
                    <rect x="7" y="20" width="2" height="2" fill="#35221e" />
                    <rect x="31" y="19" width="3" height="4" fill="#150b09" />
                    <rect x="31" y="20" width="2" height="2" fill="#35221e" />

                    <!-- 5. 纯白面具与胸前围脖 -->
                    <path d="M12 21 H28 V27 H12 Z" fill="#ffffff" /> 
                    <path d="M15 19 H25 V21 H15 Z" fill="#ffffff" /> 
                    <path d="M9 27 H31 V31 H9 Z" fill="#ffffff" /> 
                    <path d="M11 27 H29 V29 H11 Z" fill="#f2cab3" /> 
                    <path d="M13 29 H27 V37 H13 Z" fill="#ffffff" /> 

                    <!-- 6. 眼睛与五官 -->
                    <rect x="14" y="18" width="4" height="4" fill="#150b09" />
                    <rect x="15" y="19" width="2" height="2" fill="#ffffff" /> 
                    <rect x="22" y="18" width="4" height="4" fill="#150b09" />
                    <rect x="23" y="19" width="2" height="2" fill="#ffffff" />
                    <rect x="27" y="17" width="2" height="2" fill="#f2cab3" />
                    <rect x="19" y="21" width="2" height="1" fill="#150b09" />
                    <path d="M18 23 Q20 25 22 23" stroke="#150b09" stroke-width="1.2" fill="none" />
                    <rect x="10" y="22" width="2" height="1" fill="#ffc0cb" />
                    <rect x="28" y="22" width="2" height="1" fill="#ffc0cb" />

                    <!-- 7. 身体与爪子 -->
                    <rect x="9" y="27" width="22" height="13" fill="#150b09" />
                    <rect x="10" y="28" width="20" height="11" fill="#35221e" />
                    <rect x="26" y="33" width="1" height="1" fill="#ea8585" />
                    <rect x="14" y="37" width="4" height="3" fill="#150b09" />
                    <rect x="15" y="37" width="2" height="2" fill="#ffffff" /> 
                    <rect x="22" y="37" width="4" height="3" fill="#150b09" />
                    <rect x="23" y="37" width="2" height="2" fill="#ffffff" />
                </svg>
            </div>
        </div>

        <div id="dialogue-box">
            <div>
                <div id="speaker">咻咻猫</div>
                <div id="text-content">咻！新衣服合身吗？[在浅粉色房间里摇了摇巧克力色的大尾巴] 这次和照片上一模一样了吧！咻呜~</div>
            </div>
        </div>

        <div id="buttons-panel">
            <button class="pixel-btn" id="btn-feed" onclick="interact('feed')">🐟 喂鱼干</button>
            <button class="pixel-btn" id="btn-pet" onclick="interact('pet')">✋ 摸摸头</button>
            <button class="pixel-btn" id="btn-play" onclick="interact('play')">🌿 逗猫棒</button>
            <button class="pixel-btn" id="btn-poke" onclick="interact('poke')">👉 戳一戳</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="和咻咻猫说点什么..." onkeydown="if(event.key === 'Enter' || event.keyCode === 13) submitChat()">
            <button id="chat-submit" onclick="submitChat()">发送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 大模型配置：请在此输入有效的 DeepSeek API Key
        // ==========================================
        const CONFIG = {
            apiKey: "在这里填入你的_DEEPSEEK_API_KEY", 
            apiUrl: "https://api.deepseek.com/v1", 
            apiModel: "deepseek-chat" 
        };
        // ==========================================

        const state = {
            hunger: 60,
            affection: 60,
            isIgnoring: false,  
            ignoreCount: 0,
            isProcessing: false // 全局状态锁
        };

        // 彻底、极端安全的过滤函数：
        // 仅允许：大写字母、小写字母、数字、连字符(-)、下划线(_)
        // 这样可以 100% 确保过滤掉任何空白、中文标点、全角符号及不可见字符
        function getStrictCleanKey() {
            if (!CONFIG || typeof CONFIG.apiKey !== 'string') return "";
            return CONFIG.apiKey.replace(/[^A-Za-z0-9\-_]/g, "").trim();
        }

        // 统一控制所有组件的状态
        function setInteractiveState(enabled) {
            state.isProcessing = !enabled;
            
            const buttons = ['btn-feed', 'btn-pet', 'btn-play', 'btn-poke', 'chat-submit'];
            buttons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enabled;
            });

            const inputEl = document.getElementById('chat-input');
            if (inputEl) {
                inputEl.disabled = !enabled;
                if (enabled) {
                    setTimeout(() => inputEl.focus(), 50);
                }
            }
        }

        // 调用大模型对话接口
        async function fetchAIResponse(userMessage) {
            const cleanKey = getStrictCleanKey();

            // 如果 Key 长度不足，或者依然是默认模板名称，直接降级
            if (!cleanKey || cleanKey.length < 15 || cleanKey.includes("sk-7ab387a1cb474f6db6976ea3a8aef8f5")) {
                return localFallbackChat(userMessage);
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 6000); // 6秒超时

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cleanKey}` // cleanKey 此时 100% 为 ASCII 字符
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: [
                            { role: "system", content: getSystemPrompt() },
                            { role: "user", content: userMessage }
                        ],
                        max_tokens: 150,
                        temperature: 0.8
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`[HTTP ${response.status}] - ${errText}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                clearTimeout(timeoutId);
                console.error("API 报错:", err);
                
                if (err.name === 'AbortError') {
                    return "[连接超时，咻咻自动切换回本地模式] 哼，半天没反应，咻咻不想等了！\n" + localFallbackChat(userMessage);
                }
                return `[脑电波连接不顺畅，暂时无法联网...] \n${localFallbackChat(userMessage)}`;
            }
        }

        function getSystemPrompt() {
            return `
                你是一只名叫“咻咻猫”的16位复古游戏像素风电子宠物猫。
                外观：你是一只胖乎乎的、有着精致网格的深巧克力色猫咪。你的面部、胸前和前爪都是纯白色的（穿着白手套），胸部边缘有一圈漂亮的奶油橘色荷叶边过渡。你有一只很萌的粉红色耳心、头上有一颗白色高光像素、大腿上有一颗粉色红晕。你正端坐在精美温馨的浅粉色猫窝房间里。
                性格：极度傲娇、口嫌体正直、对主人依赖但嘴上坚决不承认。说话喜欢带“咻”、“咻呜”的尾音，动作描述放在方括号[]里。
                
                当下的实时游戏属性状态：
                - 饱食度: ${state.hunger}/100
                - 好感度: ${state.affection}/100
                - 是否在生气背对主人: ${state.isIgnoring ? '是' : '否'}

                限制规则：
                1. 严格使用猫咪视角和设定的傲娇语气回复。
                2. 每次回答字数限制在 60 字以内，简短精炼。
            `;
        }

        // 本地降级语料库
        function localFallbackChat(text) {
            if (text.includes("你好") || text.includes("嗨") || text.includes("喂")) {
                return "咻！你好。盯着咻咻的大方眼干嘛？没看过这么标准又聪明的像素猫咪吗？";
            } else if (text.includes("可爱") || text.includes("漂亮") || text.includes("胖")) {
                return "咻呜~ [扭过头去晃了晃深褐色的大尾巴] 哼，就算你夸我可爱，我手里的鱼干也不会分你一口！";
            } else if (text.includes("天气")) {
                return "哼，连天气都要咻咻帮你查。外面反正不是下雨就是大晴天，别感冒了就行，咻！";
            } else {
                const replies = [
                    "咻？你在说什么胡话？[歪着圆脸有些疑惑地打量你]",
                    "哼，不想听你唠叨。快拿逗猫棒陪我玩，不然不理你了！",
                    "…… [在粉色猫窝里换了个更舒服的姿势，尾巴尖动了动]",
                    "咻呜！别说话了，咻咻的肚子好像有点咕噜噜叫了喵~"
                ];
                return replies[Math.floor(Math.random() * replies.length)];
            }
        }

        // 核心交互逻辑
        async function interact(action) {
            if (state.isProcessing) return; 
            
            setInteractiveState(false); 

            try {
                let reply = "";
                let emoji = "";

                if (state.isIgnoring && action !== 'poke') {
                    reply = "…… [咻咻猫固执地背对着你，把深褐色大尾巴甩得邦邦响，似乎在等你跟它道歉] 哼。";
                    updateUI(reply, "💢");
                    return;
                }

                if (action === 'feed') {
                    state.hunger = Math.min(100, state.hunger + 20);
                    state.affection = Math.min(100, state.affection + 5);
                    reply = "咻！鱼干真香！[吧唧吧唧地吃完，用小舌头舔了舔雪白的口罩区域] 算你识相！";
                    emoji = "🍖";
                    await tryToTriggerIgnore(0.2); 
                } else if (action === 'pet') {
                    state.affection = Math.min(100, state.affection + 12);
                    reply = "呼噜呼噜……[虽然很舒服但转过了大圆头] 哼，只是看在你这么诚恳的份上才让你摸一摸的！";
                    emoji = "❤️";
                    await tryToTriggerIgnore(0.3); 
                } else if (action === 'play') {
                    state.hunger = Math.max(0, state.hunger - 10);
                    state.affection = Math.min(100, state.affection + 10);
                    reply = "咻！看爪！[在粉色地板上飞快扑腾，脸颊两侧的毛毛也跟着抖动] 本喵才不是想玩，只是觉得这羽毛很碍眼！";
                    emoji = "✨";
                } else if (action === 'poke') {
                    if (state.isIgnoring) {
                        state.ignoreCount--;
                        if (state.ignoreCount <= 0) {
                            state.isIgnoring = false;
                            state.affection = Math.min(100, state.affection + 15);
                            reply = "好啦好啦！真拿你没办法！[有些别扭地转回脸来，尾巴再次高高竖起] 讨厌，尾巴都被你戳歪了，咻呜！";
                            emoji = "✨";
                            const container = document.getElementById('sprite-container');
                            if (container) container.classList.remove('tsundere-ignore');
                        } else {
                            reply = `不要乱戳！[咻咻猫耸了耸毛，不肯转过来，看样子还要戳 ${state.ignoreCount} 次]`;
                            emoji = "💢";
                        }
                    } else {
                        reply = "哎呀！[抖了抖红粉色的耳心瞪你] 别戳我！再戳咻咻可要生气不理你了！";
                        emoji = "❔";
                        await tryToTriggerIgnore(0.4); 
                    }
                }

                updateUI(reply, emoji);
            } catch (err) {
                console.error("Interaction Error:", err);
            } finally {
                setTimeout(() => {
                    setInteractiveState(true);
                }, 300);
            }
        }

        function tryToTriggerIgnore(chance) {
            return new Promise((resolve) => {
                if (state.isIgnoring) {
                    resolve();
                    return;
                }
                if (Math.random() < chance) {
                    state.isIgnoring = true;
                    state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                    
                    const container = document.getElementById('sprite-container');
                    if (container) container.classList.add('tsundere-ignore');
                    
                    setTimeout(() => {
                        updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在粉色地板上] 咻咻决定不理你了，除非你戳它道歉！", "💢");
                        resolve();
                    }, 500);
                } else {
                    resolve();
                }
            });
        }

        // 发送自由文字对话
        async function submitChat() {
            if (state.isProcessing) return;

            const inputEl = document.getElementById('chat-input');
            if (!inputEl) return;
            
            const text = inputEl.value.trim();
            if (!text) return;

            // 1. 使用极其安全的过滤逻辑，剔除任何可能导致 Headers 报错的字符
            const cleanKey = getStrictCleanKey();
            const isDefaultOrInvalid = !cleanKey || 
                                       cleanKey.length < 15 || 
                                       cleanKey.includes("API_KEY");

            // 2. 扣除饱食度
            state.hunger = Math.max(0, state.hunger - 5);

            // 3. 生气背对状态拦截
            if (state.isIgnoring) {
                updateUI("…… [咻咻猫一动不动，尾巴冷淡地在猫窝外甩了一下，似乎完全不想理你]", "💤");
                inputEl.value = "";
                return;
            }

            // 4. 如果密钥无效，走本地聊天逻辑，且不锁死界面
            if (isDefaultOrInvalid) {
                inputEl.value = "";
                const reply = localFallbackChat(text);
                updateUI(reply, "💬");
                return;
            }

            // 5. 在线模式：锁定界面并请求 API
            setInteractiveState(false); 
            inputEl.value = ""; 
            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            try {
                const reply = await fetchAIResponse(text);
                updateUI(reply, "💬");
            } catch (err) {
                console.error("Chat Submit Error:", err);
                updateUI("[咻咻的脑回路卡住了，自动切换为本地对话] \n" + localFallbackChat(text), "❌");
            } finally {
                // 确保任何异常情况下，UI 都能在最后被恢复
                setInteractiveState(true); 
            }
        }

        function updateUI(replyText, emoji) {
            const hungerBar = document.getElementById('hunger-bar');
            const affectionBar = document.getElementById('affection-bar');
            const textContent = document.getElementById('text-content');

            if (hungerBar) hungerBar.style.width = state.hunger + '%';
            if (affectionBar) affectionBar.style.width = state.affection + '%';
            if (textContent) textContent.innerText = replyText;

            if (emoji) {
                const screen = document.getElementById('game-screen');
                if (screen) {
                    const effect = document.createElement('div');
                    effect.className = 'emoji-effect';
                    effect.innerText = emoji;
                    effect.style.left = state.isIgnoring ? '40%' : '60%';
                    effect.style.top = '50%';
                    screen.appendChild(effect);
                    setTimeout(() => effect.remove(), 1000);
                }
            }
        }
    </script>
</body>
</html>
