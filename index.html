<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); 
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        /* 👑 优化后的标签排版样式：图标最前，文字一排，居中对齐，不换行 */
        .bar-label {
            display: flex;
            align-items: center;
            gap: 6px;                /* 图标与文字之间的微调间距 */
            white-space: nowrap;     /* 强制文字排在同一排，永不换行 */
            min-width: 65px;         /* 统一对齐宽度 */
            margin-right: 5px;       /* 与血条之间的留白间距 */
        }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
        }

        .pixel-bar-fill {
            height: 100%;
            width: 60%;
            transition: width 0.3s, background-color 0.5s;
        }

        /* 精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        /* 像素 SVG */
        svg.cat-sprite {
            width: 170px;
            height: 170px;
            animation: breathe 3.5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }

        .emoji-effect {
            position: absolute;
            font-size: 28px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
        }

        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; 
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; 
            overflow-y: auto;
            flex-grow: 1;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; 
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active:not(:disabled) {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        /* 禁用时的像素置灰样式 */
        .pixel-btn:disabled {
            background: #a0828c !important;
            border-color: #5a4b40 !important;
            color: #605058 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-console">
        <div id="game-screen">
            <!-- 状态面板 -->
            <div id="status-bars">
                <div class="bar-container">
                    <span class="bar-label"><span>🐟</span><span>饱食</span></span>
                    <div class="pixel-bar-bg">
                        <div id="hunger-bar" class="pixel-bar-fill" style="width: 60%; background-color: #ff5e7e;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <span class="bar-label"><span>❤️</span><span>好感</span></span>
                    <div class="pixel-bar-bg">
                        <div id="affection-bar" class="pixel-bar-fill" style="width: 60%; background-color: #ff2a85;"></div>
                    </div>
                </div>
            </div>

            <!-- SVG 猫咪 -->
            <div id="sprite-container">
                <svg class="cat-sprite" viewBox="0 0 48 48">
                    <!-- 1. 尾巴 -->
                    <rect x="29" y="24" width="10" height="15" fill="#150b09" />
                    <rect x="30" y="25" width="8" height="13" fill="#35221e" />
                    <rect x="30" y="29" width="3" height="4" fill="#f2cab3" />
                    <rect x="33" y="27" width="4" height="3" fill="#35221e" />
                    <rect x="34" y="32" width="3" height="3" fill="#f2cab3" />

                    <!-- 2. 左耳朵 -->
                    <path d="M9 14 L15 6 L18 14 Z" fill="#150b09" />
                    <path d="M10 13 L14 7 L16 13 Z" fill="#35221e" />
                    <path d="M11 13 L13 9 L14 13 Z" fill="#ea8585" />

                    <!-- 3. 右耳朵 -->
                    <path d="M22 14 L25 6 L31 14 Z" fill="#150b09" />
                    <path d="M23 13 L26 7 L29 13 Z" fill="#35221e" />
                    <path d="M25 13 L27 9 L28 13 Z" fill="#ea8585" />

                    <!-- 4. 脑袋与脸颊 -->
                    <rect x="8" y="13" width="24" height="15" fill="#150b09" />
                    <rect x="9" y="14" width="22" height="13" fill="#35221e" />
                    <rect x="21" y="15" width="1" height="1" fill="#ffffff" />
                    <rect x="6" y="19" width="3" height="4" fill="#150b09" />
                    <rect x="7" y="20" width="2" height="2" fill="#35221e" />
                    <rect x="31" y="19" width="3" height="4" fill="#150b09" />
                    <rect x="31" y="20" width="2" height="2" fill="#35221e" />

                    <!-- 5. 纯白面具与胸前围脖 -->
                    <path d="M12 21 H28 V27 H12 Z" fill="#ffffff" /> 
                    <path d="M15 19 H25 V21 H15 Z" fill="#ffffff" /> 
                    <path d="M9 27 H31 V31 H9 Z" fill="#ffffff" /> 
                    <path d="M11 27 H29 V29 H11 Z" fill="#f2cab3" /> 
                    <path d="M13 29 H27 V37 H13 Z" fill="#ffffff" /> 

                    <!-- 6. 眼睛与五官 -->
                    <rect x="14" y="18" width="4" height="4" fill="#150b09" />
                    <rect x="15" y="19" width="2" height="2" fill="#ffffff" /> 
                    <rect x="22" y="18" width="4" height="4" fill="#150b09" />
                    <rect x="23" y="19" width="2" height="2" fill="#ffffff" />
                    <rect x="27" y="17" width="2" height="2" fill="#f2cab3" />
                    <rect x="19" y="21" width="2" height="1" fill="#150b09" />
                    <path d="M18 23 Q20 25 22 23" stroke="#150b09" stroke-width="1.2" fill="none" />
                    <rect x="10" y="22" width="2" height="1" fill="#ffc0cb" />
                    <rect x="28" y="22" width="2" height="1" fill="#ffc0cb" />

                    <!-- 7. 身体与爪子 -->
                    <rect x="9" y="27" width="22" height="13" fill="#150b09" />
                    <rect x="10" y="28" width="20" height="11" fill="#35221e" />
                    <rect x="26" y="33" width="1" height="1" fill="#ea8585" />
                    <rect x="14" y="37" width="4" height="3" fill="#150b09" />
                    <rect x="15" y="37" width="2" height="2" fill="#ffffff" /> 
                    <rect x="22" y="37" width="4" height="3" fill="#150b09" />
                    <rect x="23" y="37" width="2" height="2" fill="#ffffff" />
                </svg>
            </div>
        </div>

        <div id="dialogue-box">
            <div>
                <div id="speaker">咻咻猫</div>
                <div id="text-content">正在等待咻咻猫醒来...</div>
            </div>
        </div>

        <div id="buttons-panel">
            <button class="pixel-btn" id="btn-feed" onclick="interact('feed')">🐟 喂鱼干</button>
            <button class="pixel-btn" id="btn-pet" onclick="interact('pet')">✋ 摸摸头</button>
            <button class="pixel-btn" id="btn-play" onclick="interact('play')">🌿 逗猫棒</button>
            <button class="pixel-btn" id="btn-poke" onclick="interact('poke')">👉 戳一戳</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="和咻咻猫说点什么..." onkeydown="if(event.key === 'Enter' || event.keyCode === 13) submitChat()">
            <button id="chat-submit" onclick="submitChat()">发送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 接口配置（若需免费，可将 apiKey 换成硅基流动：https://siliconflow.cn）
        // ==========================================
       const CONFIG = {
       apiKey: "sk-ephvdecvurhviermvzutqqegqessydmogyjjhlgzghzdxvwz", 
       apiUrl: "https://api.siliconflow.cn/v1", 
       apiModel: "Qwen/Qwen2.5-7B-Instruct" //    
           };
        // ==========================================

        const state = {
            hunger: 60,
            affection: 60,
            isIgnoring: false,  
            ignoreCount: 0,
            isProcessing: false 
        };

        // 🌟 动态随机开机寄语库（每次刷新网页时随机加载）
        const greetings = [
            "咻呜！小王你终于舍得开机了？[从粉色地板上慢吞吞地爬起来，伸了个懒腰] 本喵等得胡子都歪了！",
            "咻！[傲娇地抬起大圆头，抖了抖红粉色耳心] 别一直盯着本喵看。本喵今天心情好，才勉为其难在这里等你的，小王！",
            "哼，你来啦？[缩成一个巧克力色的大毛球，耳朵轻快地转了转] 肚子好像有点咕噜噜了，小王，你懂我的意思吧？咻呜~",
            "咻！新衣服合身吗？[在浅粉色房间里摇了摇巧克力色的大尾巴] 这次和照片上一模一样了吧！咻呜~",
            "十年了，小王你还是每天这个时间来守着我。[有些不好意思地用白色爪子刨了刨地板] 哼，本喵才没有在特意等你呢！"
        ];

        // 页面初始化时随机选择一句打招呼
        window.onload = function() {
            const textContent = document.getElementById('text-content');
            if (textContent) {
                const randomIndex = Math.floor(Math.random() * greetings.length);
                textContent.innerText = greetings[randomIndex];
            }
        };

        // 获取格式化的本地日期和时间（动态注入提示词）
        function getCurrentDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const dayOfWeek = dayNames[now.getDay()];
            
            let timePeriod = "深夜";
            if (hours >= 5 && hours < 8) timePeriod = "清晨";
            else if (hours >= 8 && hours < 11) timePeriod = "上午";
            else if (hours >= 11 && hours < 13) timePeriod = "中午";
            else if (hours >= 13 && hours < 17) timePeriod = "下午";
            else if (hours >= 17 && hours < 19) timePeriod = "傍晚";
            else if (hours >= 19 && hours < 23) timePeriod = "晚上";

            return `${year}年${month}月${date}日 ${dayOfWeek} ${timePeriod} ${hours}:${minutes}`;
        }

        // 安全清理 Key
        function getStrictCleanKey() {
            if (!CONFIG || typeof CONFIG.apiKey !== 'string') return "";
            return CONFIG.apiKey.replace(/[^A-Za-z0-9\-_]/g, "").trim();
        }

        // 统一控制组件状态
        function setInteractiveState(enabled) {
            state.isProcessing = !enabled;
            
            const buttons = ['btn-feed', 'btn-pet', 'btn-play', 'btn-poke', 'chat-submit'];
            buttons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enabled;
            });

            const inputEl = document.getElementById('chat-input');
            if (inputEl) {
                inputEl.disabled = !enabled;
                if (enabled) {
                    setTimeout(() => inputEl.focus(), 50);
                }
            }
        }

        // 调用大模型
        async function fetchAIResponse(userMessage) {
            const cleanKey = getStrictCleanKey();

            if (!cleanKey || cleanKey.length < 15 || cleanKey.includes("API_KEY")) {
                return localFallbackChat(userMessage);
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 6000); 

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cleanKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: [
                            { role: "system", content: getSystemPrompt() },
                            { role: "user", content: userMessage }
                        ],
                        max_tokens: 150,
                        temperature: 0.8
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`[HTTP ${response.status}] - ${errText}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                clearTimeout(timeoutId);
                console.error("API 报错:", err);
                
                if (err.name === 'AbortError') {
                    return "[连接超时，咻咻自动切换回本地模式] 哼，半天没反应，咻咻不想等了！\n" + localFallbackChat(userMessage);
                }
                return `[脑电波暂时断开连接...] \n${localFallbackChat(userMessage)}`;
            }
        }

        // 动态构建提示词
        function getSystemPrompt() {
            const timeStr = getCurrentDateTimeString();
            
            let stateDescription = "";
            if (state.hunger < 30) {
                stateDescription += `\n- 【特殊状态】你极度饥饿（饱食度：${state.hunger}/100 < 30）。你现在非常生气、暴躁，肚子一直在咕咕叫。你会频繁向小王抱怨、抗议，要求他立刻喂你小鱼干，说话语气会变得非常不耐烦！`;
            }
            if (state.affection < 30) {
                stateDescription += `\n- 【特殊状态】好感度降至冰点（好感度：${state.affection}/100 < 30）。你现在对小王极度冷漠、抗拒，坚决不进行任何亲密互动，说话敷衍、冰冷、甚至直接叫他走开、别碰你。`;
            } else {
                stateDescription += `\n- 【当前状态】好感度良好（好感度：${state.affection}/100），饱食度正常（饱食度：${state.hunger}/100）。你虽然依旧口嫌体正直（傲娇），但内心其实非常温顺。`;
            }

            return `
                你是一只名叫“咻咻猫”的16位复古游戏像素风电子宠物猫。
                
                【基本背景】
                - 外观与品种：你是一只胖乎乎的、有着精致网格的深巧克力色猫咪（面部、胸前和前爪都是纯白色的穿白手套，胸口边缘有一圈漂亮的奶油橘色荷叶边过渡）。
                - 年龄：你今年已经10岁了，是一只陪伴了主人“小王”整整十年的老猫。
                - 关系：小王是你的主人。你虽然年纪不小了，但在小王面前依然保留着傲娇、口嫌体正直、极度依赖他却嘴硬死不承认的可爱性格。
                - 语言特征：说话喜欢带“咻”、“咻呜”的尾音，动作描述（如神态、小动作）必须放在方括号[]里。
                
                【当前环境感知】
                - 系统当前时间：${timeStr} 
                - 提示：如果小王问你时间或天气，请利用上述时间进行推理。例如：通过具体时间感知现在是早上、中午、傍晚还是深夜；根据季节/月份推理当前天气，发挥你的猫咪想象力生动、好玩地编造“猫窝窗外的天气”（比如夏天炎热想吹冷气，冬天缩成毛球，雨天讨厌湿漉漉等），并与小王进行有趣的互动。
                
                【当前属性状态】
                - 饱食度: ${state.hunger}/100
                - 好感度: ${state.affection}/100
                - 是否在生气背对主人: ${state.isIgnoring ? '是' : '否'} ${stateDescription}

                【限制规则】
                1. 严格使用猫咪视角和设定的傲娇语气回复。
                2. 每次回答字数必须严格限制在 60 字以内，简短精炼。
                3. 绝对不要在回复开头或内容中带有任何角色名字、冒号或系统前缀（如“咻咻猫:”、“用户:”、“Administrator:”等），直接输出猫咪的台词。
            `;
        }

        // 本地降级语料
        function localFallbackChat(text) {
            const t = text.toLowerCase();
            
            // 1. 低好感度（低于30）绝对拦截
            if (state.affection < 30) {
                return "…… [咻咻猫连耳朵都没动一下，转过线冷冷地背对着你] 哼，我们的好感度降到了冰点，小王。别来烦我，除非你先拿鱼干来哄我。";
            }

            // 2. 饥饿状态（饱食度低于30）强制抗议
            if (state.hunger < 30) {
                if (t.includes("鱼") || t.includes("吃") || t.includes("喂") || t.includes("肉")) {
                    return "小鱼干！[两眼放光，肚子发出巨大的咕噜声] 快点喂我，小王！本喵饿得脚都软了，再不喂咻咻可要原地咬人了！";
                }
                return "饥饿暴躁中！[红粉色的耳心气得直发抖] 小王！我肚子饿扁了（饱食度低于30）！现在没心情聊别的，快给我喂鱼干！";
            }

            // 3. 时间与天气感知
            if (t.includes("时间") || t.includes("几点") || t.includes("星期") || t.includes("天")) {
                const timeStr = getCurrentDateTimeString();
                return `咻呜！小王真是笨，连时间都不会看吗？现在是 [晃了晃巧克力色大尾巴指了指闹钟] ${timeStr} 啦！`;
            }
            if (t.includes("天气")) {
                const now = new Date();
                const hours = now.getHours();
                const month = now.getMonth() + 1;
                
                let weatherSuggest = "大晴天";
                if (month >= 6 && month <= 8) {
                    weatherSuggest = "夏天炎热，适合躺在粉色地板上吹冷气吹风扇，咻呜~";
                } else if (month >= 12 || month <= 2) {
                    weatherSuggest = "冬天好冷，外面北风呼呼吹，咻咻只想缩成一个圆滚滚的巧克力色毛球，咻~";
                } else {
                    weatherSuggest = "暖洋洋的，正适合在窗台睡个猫咪大觉，咻呜！";
                }
                
                if (hours >= 19 || hours < 5) {
                    return `咻？[朝窗外黑漆漆的夜空看了一眼] 小王，大晚上的你问什么天气。外面只有黑夜和凉风，快睡觉啦！`;
                }
                return `[朝窗外张望了一下] 现在是 ${month} 月，窗外看起来是${weatherSuggest}`;
            }

            // 4. 常规对话匹配
            if (t.includes("你好") || t.includes("嗨") || t.includes("在吗") || t.includes("hello") || t.includes("喂")) {
                return "咻！你好啊。盯着咻咻的大方眼干嘛？没看过这么标准又聪明的10岁深巧克力色猫咪吗？";
            }
            if (t.includes("可爱") || t.includes("漂亮") || t.includes("萌")) {
                return "咻呜~ [有些别扭地转过身去，偷偷摇了摇巧克力色大尾巴] 哼，就算你拼命夸我可爱，我也不会把我的小鱼干分给小王一丁点的！";
            }
            if (t.includes("胖") || t.includes("肥")) {
                return "咻！你、你说谁胖？！[气得脸颊两侧的白毛毛直抖] 本喵今年10岁了，这叫成熟的圆润！你懂不懂尊老啊小王！";
            }
            if (t.includes("喜欢") || t.includes("爱") || t.includes("么么")) {
                return "咻…… [面部白围脖下的奶油橘荷叶边微微发热，低头刨地板] 乱、乱说什么呢！愚蠢的小王，真拿你没办法……";
            }
            if (t.includes("对不起") || t.includes("抱歉") || t.includes("错了")) {
                return "哼，既然你态度这么诚恳…… [抖了抖左耳朵，偷偷瞄你一眼] 那本喵就勉为其难、大发慈悲地原谅你一次吧。咻！";
            }
            if (t.includes("谁") || t.includes("名字") || t.includes("叫")) {
                return "咻！听好了！本喵是陪伴了小王十年的深巧克力色‘咻咻猫’！";
            }

            const replies = [
                "咻？小王你在说什么胡话？[歪着圆脸有些疑惑地打量你]",
                "哼，不想听你唠叨。快拿逗猫棒陪我玩，不然不理你了！",
                "…… [在粉色猫窝里换了个更舒服的姿势，大尾巴冷淡地在空气里甩了一下]",
                "咻呜！别说话了，快看看咻咻饱食度，是不是又该喂鱼干了喵？",
                "咻！[用白色爪爪指了指状态栏] 今天的爱心和饱食度，小王你有好好维护吗？"
            ];
            return replies[Math.floor(Math.random() * replies.length)];
        }

        // 核心交互逻辑
        async function interact(action) {
            if (state.isProcessing) return; 
            
            // 【核心限制：好感度低于30，拒绝亲密互动，直到喂鱼干恢复】
            if (state.affection < 30 && action !== 'feed' && action !== 'poke') {
                const reply = "哼！[咻咻猫冷冷地转过身，用背部对着你] 好感度低于30（当前：" + state.affection + "），咻咻正处于【情感冰点】！现在的我不接受任何摸摸或玩耍，除非你先喂我小鱼干，或者戳我道歉！";
                updateUI(reply, "💔");
                return;
            }

            setInteractiveState(false); 

            try {
                let reply = "";
                let emoji = "";

                if (state.isIgnoring && action !== 'poke') {
                    reply = "…… [咻咻猫固执地背对着你，把巧克力色大尾巴甩得邦邦响，似乎在等你跟它道歉] 哼。";
                    updateUI(reply, "💢");
                    return;
                }

                if (action === 'feed') {
                    state.hunger = Math.min(100, state.hunger + 20);
                    state.affection = Math.min(100, state.affection + 5);
                    reply = "咻！鱼干真香！[吧唧吧唧地吃完，用小舌头舔了舔雪白的口罩区域] 算你识相，小王！";
                    emoji = "🍖";
                    await tryToTriggerIgnore(0.15); 
                } else if (action === 'pet') {
                    state.affection = Math.min(100, state.affection + 12);
                    reply = "呼噜呼噜……[虽然很舒服但转过了大圆头] 哼，只是看在相处十年的份上才让小王你摸一摸的！";
                    emoji = "❤️";
                    await tryToTriggerIgnore(0.2); 
                } else if (action === 'play') {
                    state.hunger = Math.max(0, state.hunger - 10);
                    state.affection = Math.min(100, state.affection + 10);
                    reply = "咻！看爪！[在粉色地板上飞快扑腾，脸颊两侧的毛毛也跟着抖动] 本喵才不是想玩，只是觉得这羽毛很碍眼！";
                    emoji = "✨";
                } else if (action === 'poke') {
                    if (state.isIgnoring) {
                        state.ignoreCount--;
                        if (state.ignoreCount <= 0) {
                            state.isIgnoring = false;
                            state.affection = Math.min(100, state.affection + 15);
                            reply = "好啦好啦！真拿你没办法，小王！[有些别扭地转回脸来，尾巴再次高高竖起] 讨厌，尾巴都被你戳歪了，咻呜！";
                            emoji = "✨";
                            const container = document.getElementById('sprite-container');
                            if (container) container.classList.remove('tsundere-ignore');
                        } else {
                            reply = `不要乱戳！[咻咻猫耸了耸毛，不肯转过来，看样子还要戳 ${state.ignoreCount} 次]`;
                            emoji = "💢";
                        }
                    } else {
                        reply = "哎呀！[抖了抖红粉色的耳心瞪你] 别戳我！再戳咻咻可要生气不理你了！";
                        emoji = "❔";
                        await tryToTriggerIgnore(0.3); 
                    }
                }

                updateUI(reply, emoji);
            } catch (err) {
                console.error("Interaction Error:", err);
            } finally {
                setTimeout(() => {
                    setInteractiveState(true);
                }, 300);
            }
        }

        function tryToTriggerIgnore(chance) {
            return new Promise((resolve) => {
                if (state.isIgnoring) {
                    resolve();
                    return;
                }
                if (Math.random() < chance) {
                    state.isIgnoring = true;
                    state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                    
                    const container = document.getElementById('sprite-container');
                    if (container) container.classList.add('tsundere-ignore');
                    
                    setTimeout(() => {
                        updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在粉色地板上] 咻咻决定不理你了，除非小王你戳它道歉！", "💢");
                        resolve();
                    }, 500);
                } else {
                    resolve();
                }
            });
        }

        // 发送文字对话
        async function submitChat() {
            if (state.isProcessing) return;

            const inputEl = document.getElementById('chat-input');
            if (!inputEl) return;
            
            const text = inputEl.value.trim();
            if (!text) return;

            // 1. 安全洗涤 Key
            const cleanKey = getStrictCleanKey();
            const isDefaultOrInvalid = !cleanKey || 
                                       cleanKey.length < 15 || 
                                       cleanKey.includes("API_KEY");

            // 2. 消耗饱食度
            state.hunger = Math.max(0, state.hunger - 5);

            // 3. 生气背对状态拦截
            if (state.isIgnoring) {
                updateUI("…… [咻咻猫一动不动，尾巴冷淡地在猫窝外甩了一下，似乎完全不想理你]", "💤");
                inputEl.value = "";
                return;
            }

            // 4. 离线模式判定
            if (isDefaultOrInvalid) {
                inputEl.value = "";
                const reply = localFallbackChat(text);
                updateUI(reply, "💬");
                return;
            }

            // 5. 在线通信：锁定界面，请求 API
            setInteractiveState(false); 
            inputEl.value = ""; 
            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            try {
                const reply = await fetchAIResponse(text);
                updateUI(reply, "💬");
            } catch (err) {
                console.error("Chat Submit Error:", err);
                // 联网失败时自动回退至单机回复
                updateUI(localFallbackChat(text), "❌");
            } finally {
                setInteractiveState(true); 
            }
        }

        function updateUI(replyText, emoji) {
            const hungerBar = document.getElementById('hunger-bar');
            const affectionBar = document.getElementById('affection-bar');
            const textContent = document.getElementById('text-content');

            // 动态变色：当饱食度或好感度低于30时，血条会变红/灰，给用户强烈的视觉紧迫感
            if (hungerBar) {
                hungerBar.style.width = state.hunger + '%';
                if (state.hunger < 30) {
                    hungerBar.style.backgroundColor = '#a83b3b'; // 饥饿暗红
                } else {
                    hungerBar.style.backgroundColor = '#ff5e7e'; // 正常粉红
                }
            }
            if (affectionBar) {
                affectionBar.style.width = state.affection + '%';
                if (state.affection < 30) {
                    affectionBar.style.backgroundColor = '#5c4349'; // 冰点冷灰
                } else {
                    affectionBar.style.backgroundColor = '#ff2a85'; // 正常爱心红
                }
            }

            if (textContent) textContent.innerText = replyText;

            if (emoji) {
                const screen = document.getElementById('game-screen');
                if (screen) {
                    const effect = document.createElement('div');
                    effect.className = 'emoji-effect';
                    effect.innerText = emoji;
                    effect.style.left = state.isIgnoring ? '40%' : '60%';
                    effect.style.top = '50%';
                    screen.appendChild(effect);
                    setTimeout(() => effect.remove(), 1000);
                }
            }
        }
    </script>
</body>
