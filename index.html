<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 16-bit 复古像素风 UI 样式 */
        body {
            background-color: #2c251e;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 400px;
            background: #8b7355; 
            border: 6px solid #4a3b2c;
            border-radius: 12px;
            box-shadow: 0 10px 0 #2c2117, 0 20px 20px rgba(0,0,0,0.5);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        #game-screen {
            background: linear-gradient(to bottom, #ffe4b5, #ffd39b); 
            border: 6px solid #4a3b2c;
            border-radius: 6px;
            height: 260px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #status-bars {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            color: #4a3b2c;
            text-shadow: 1px 1px 0px #fff;
        }

        .bar-label { width: 45px; }
        
        .pixel-bar-bg {
            width: 80px;
            height: 12px;
            background: #e2d1bc;
            border: 2px solid #4a3b2c;
            margin-left: 5px;
        }

        .pixel-bar-fill {
            height: 100%;
            background: #ff4500; 
            width: 60%;
            transition: width 0.3s;
        }
        #affection-bar { background: #ff1493; }

        /* 咻咻猫精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 20px;
            width: 200px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease;
        }

        /* 傲娇状态：猫咪会水平翻转（背对你） */
        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03) translateY(-2px); }
        }

        svg.cat-sprite {
            width: 130px;
            height: 130px;
            animation: breathe 3s infinite ease-in-out;
            image-rendering: pixelated;
        }

        .emoji-effect {
            position: absolute;
            font-size: 24px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }

        #dialogue-box {
            background: #1e1e1e;
            border: 4px solid #fff;
            outline: 2px solid #1e1e1e;
            border-radius: 4px;
            height: 110px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #speaker {
            font-size: 11px;
            color: #ffaa00;
            font-weight: bold;
            margin-bottom: 2px;
        }

        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #00ffcc; 
            overflow-y: auto;
            flex-grow: 1;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e2a85c;
            border: 3px solid #4a3b2c;
            border-radius: 4px;
            color: #3b2d1f;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b27a35, 2px 2px 0px #2c2117;
            outline: none;
        }

        .pixel-btn:active {
            box-shadow: inset 2px 2px 0px #b27a35;
            transform: translate(1px, 1px);
        }

        #btn-poke {
            background: #5ca8e2;
            border-color: #2c3b4a;
            box-shadow: inset -2px -2px 0px #357ab2, 2px 2px 0px #17212c;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #222;
            border: 3px solid #4a3b2c;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #4caf50;
            color: white;
            border: 3px solid #2e7d32;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-console">
        <div id="game-screen">
            <div id="status-bars">
                <div class="bar-container">
                    <span class="bar-label">🐟 饱食</span>
                    <div class="pixel-bar-bg">
                        <div id="hunger-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <span class="bar-label">❤️ 好感</span>
                    <div class="pixel-bar-bg">
                        <div id="affection-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <div id="sprite-container">
                <!-- 16-bit SVG 精灵图（绿眼睛、白嘴唇、橘色窝） -->
                <svg class="cat-sprite" viewBox="0 0 100 100">
                    <ellipse cx="50" cy="85" rx="42" ry="12" fill="#d35400" stroke="#8e44ad" stroke-width="2" />
                    <ellipse cx="50" cy="82" rx="38" ry="10" fill="#e67e22" />
                    <ellipse cx="50" cy="58" rx="26" ry="24" fill="#a0522d" stroke="#3e2723" stroke-width="2" />
                    <path d="M28 50 Q38 52 40 54" stroke="#3e2723" stroke-width="2" fill="none" />
                    <path d="M72 50 Q62 52 60 54" stroke="#3e2723" stroke-width="2" fill="none" />
                    <path d="M26 60 Q36 60 38 62" stroke="#3e2723" stroke-width="2" fill="none" />
                    <path d="M74 60 Q64 60 62 62" stroke="#3e2723" stroke-width="2" fill="none" />
                    <circle cx="50" cy="38" r="20" fill="#a0522d" stroke="#3e2723" stroke-width="2" />
                    <path d="M33 34 Q40 36 41 37" stroke="#3e2723" stroke-width="1.5" fill="none" />
                    <path d="M67 34 Q60 36 59 37" stroke="#3e2723" stroke-width="1.5" fill="none" />
                    <polygon points="32,24 42,12 44,24" fill="#8b5a2b" stroke="#3e2723" stroke-width="2" />
                    <polygon points="68,24 58,12 56,24" fill="#8b5a2b" stroke="#3e2723" stroke-width="2" />
                    <circle cx="42" cy="34" r="3.5" fill="#2ecc71" stroke="#27ae60" stroke-width="1" />
                    <circle cx="42" cy="34" r="1" fill="#fff" />
                    <circle cx="58" cy="34" r="3.5" fill="#2ecc71" stroke="#27ae60" stroke-width="1" />
                    <circle cx="58" cy="34" r="1" fill="#fff" />
                    <ellipse cx="46" cy="42" rx="4.5" ry="3.5" fill="#ffffff" />
                    <ellipse cx="54" cy="42" rx="4.5" ry="3.5" fill="#ffffff" />
                    <ellipse cx="50" cy="44" rx="4" ry="2.5" fill="#ffffff" />
                    <polygon points="49,40 51,40 50,42" fill="#ffb6c1" />
                    <path d="M47 43 Q50 45 53 43" stroke="#3e2723" stroke-width="1" fill="none" />
                    <circle cx="44" cy="78" r="5" fill="#a0522d" stroke="#3e2723" stroke-width="1.5" />
                    <circle cx="56" cy="78" r="5" fill="#f5f5f5" stroke="#3e2723" stroke-width="1.5" />
                </svg>
            </div>
        </div>

        <div id="dialogue-box">
            <div>
                <div id="speaker">咻咻猫</div>
                <div id="text-content">咻！你来啦！[在橘色猫窝里摇尾巴] 抱抱咻咻好不好？（提示：在 index.html 代码中填入密钥后，咻咻就能彻底变聪明啦！）</div>
            </div>
        </div>

        <div id="buttons-panel">
            <button class="pixel-btn" onclick="interact('feed')">🐟 喂鱼干</button>
            <button class="pixel-btn" onclick="interact('pet')">✋ 摸摸头</button>
            <button class="pixel-btn" onclick="interact('play')">🌿 逗猫棒</button>
            <button class="pixel-btn" id="btn-poke" onclick="interact('poke')">👉 戳一戳</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="和咻咻猫说点什么..." onkeydown="if(event.key === 'Enter') submitChat()">
            <button id="chat-submit" onclick="submitChat()">发送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 在这里直接内置你的大模型配置（请不要泄露给他人）
        // ==========================================
        const CONFIG = {
            apiKey: "sk-7ab387a1cb474f6db6976ea3a8aef8f5", // 👈 替换这行双引号里的文字即可
            apiUrl: "https://api.deepseek.com/v1", 
            apiModel: "deepseek-chat" 
        };
        // ==========================================

        const state = {
            hunger: 60,
            affection: 60,
            isIgnoring: false,  
            ignoreCount: 0      
        };

        // 调用大模型对话接口
        async function fetchAIResponse(userMessage) {
            // 如果你没有填入密钥，使用本地简易对话
            if (!CONFIG.apiKey || CONFIG.apiKey.includes("在这里填入")) {
                return localFallbackChat(userMessage);
            }

            const systemPrompt = `
                你是一只名叫“咻咻猫”的16位复古游戏像素风电子宠物猫。
                外观：你是一只胖乎乎的棕色狸花猫，有着亮晶晶的翠绿色大眼睛，标志性的干净白胡须垫（白嘴巴、白下巴）。你正端坐在温暖的橘色猫窝里。
                性格：极度傲娇、口嫌体正直、对主人依赖但嘴上坚决不承认。说话喜欢带“咻”、“咻呜”的尾音，动作描述放在方括号[]里。
                
                当下的实时游戏属性状态：
                - 饱食度: ${state.hunger}/100（如果饱食度低于30，请在对话中委婉或傲娇地抱怨肚子空空）
                - 好感度: ${state.affection}/100（如果好感度低，你需要更冷酷；高的时候可以稍微害羞和松口）
                - 是否在生气背对主人: ${state.isIgnoring ? '是' : '否'}

                限制规则：
                1. 严格使用猫咪视角和设定的傲娇语气回复。
                2. 每次回答字数限制在 60 字以内，简短精炼。
                3. 如果主人提到了天气，你可以假设外面的天气，或者用傲娇语气进行调侃。
            `;

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userMessage }
                        ],
                        max_tokens: 150,
                        temperature: 0.8
                    })
                });

                if (!response.ok) throw new Error("API返回错误");
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                console.error(err);
                return "咻呜……刚才信号开小差了，脑电波没接上。（大模型连接失败，请检查内置的 Key 是否有效）";
            }
        }

        // 本地降级简易对话（在没有配置 Key 时备用）
        function localFallbackChat(text) {
            if (text.includes("你好") || text.includes("嗨") || text.includes("喂")) {
                return "咻！你好。盯着咻咻的白嘴唇干嘛？没看过这么标志的猫咪吗？";
            } else if (text.includes("可爱") || text.includes("漂亮") || text.includes("胖")) {
                return "咻呜~ [害羞地把头埋进橘色猫窝里] 别以为夸我，我就会把小鱼干让给你！";
            } else {
                return "咻？听不懂你在说什么。快拿好吃的或者陪我玩，不然不理你了！";
            }
        }

        // 核心交互逻辑
        async function interact(action) {
            let reply = "";
            let emoji = "";

            if (state.isIgnoring && action !== 'poke') {
                reply = "…… [咻咻猫固执地背对着你，只露出一截微动的黑尾巴尖，似乎在等你跟它道歉] 哼。";
                updateUI(reply, "💢");
                return;
            }

            if (action === 'feed') {
                state.hunger = Math.min(100, state.hunger + 20);
                state.affection = Math.min(100, state.affection + 5);
                reply = "咻！鱼干真香！[在橘色猫窝里满足地舔了舔白色的嘴唇] 算你识相！";
                emoji = "🍖";
                tryToTriggerIgnore(0.2); 
            } else if (action === 'pet') {
                state.affection = Math.min(100, state.affection + 12);
                reply = "呼噜呼噜……[它很舒服，但傲娇地转头] 哼，只是看在你这么诚恳的份上才让你摸的！";
                emoji = "❤️";
                tryToTriggerIgnore(0.3); 
            } else if (action === 'play') {
                state.hunger = Math.max(0, state.hunger - 10);
                state.affection = Math.min(100, state.affection + 10);
                reply = "咻！抓到了！[在窝里飞快出爪] 本、本喵才不是想玩，只是在帮你除掉这片羽毛！";
                emoji = "✨";
            } else if (action === 'poke') {
                if (state.isIgnoring) {
                    state.ignoreCount--;
                    if (state.ignoreCount <= 0) {
                        state.isIgnoring = false;
                        state.affection = Math.min(100, state.affection + 15);
                        reply = "好啦好啦！真拿你没办法！[有些别扭地转回大圆脸] 讨厌，衣服都被你戳乱了，咻呜！";
                        emoji = "✨";
                        document.getElementById('sprite-container').classList.remove('tsundere-ignore');
                    } else {
                        reply = `不要乱戳！[咻咻猫耸了耸毛，固执地不肯转过来，看样子还要戳 ${state.ignoreCount} 次]`;
                        emoji = "💢";
                    }
                } else {
                    reply = "哎呀！[转头用大绿眼睛瞪你] 别戳我！再戳咻咻可要生气不理你了！";
                    emoji = "❔";
                    tryToTriggerIgnore(0.4); 
                }
            }

            updateUI(reply, emoji);
        }

        function tryToTriggerIgnore(chance) {
            if (state.isIgnoring) return;
            if (Math.random() < chance) {
                state.isIgnoring = true;
                state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                document.getElementById('sprite-container').classList.add('tsundere-ignore');
                setTimeout(() => {
                    updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在猫窝里] 咻咻决定不理你了，除非你戳它道歉！", "💢");
                }, 500);
            }
        }

        // 发送自由文字对话
        async function submitChat() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = ""; 
            state.hunger = Math.max(0, state.hunger - 5);

            if (state.isIgnoring) {
                updateUI("…… [咻咻猫一动不动，尾巴冷淡地在猫窝外甩了一下，似乎完全不想理你]", "💤");
                return;
            }

            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            const reply = await fetchAIResponse(text);
            
            updateUI(reply, "💬");
        }

        function updateUI(replyText, emoji) {
            document.getElementById('hunger-bar').style.width = state.hunger + '%';
            document.getElementById('affection-bar').style.width = state.affection + '%';
            document.getElementById('text-content').innerText = replyText;

            if (emoji) {
                const screen = document.getElementById('game-screen');
                const effect = document.createElement('div');
                effect.className = 'emoji-effect';
                effect.innerText = emoji;
                effect.style.left = state.isIgnoring ? '40%' : '60%';
                effect.style.top = '50%';
                screen.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
            }
        }
    </script>
</body>
</html>
