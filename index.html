<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 像素猫窝</title>
    <style>
        /* 全局复古游戏机风格复位 */
        body {
            background-color: #231c16;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        /* 游戏机外壳 */
        #game-console {
            width: 420px;
            background: #9d744a; 
            border: 6px solid #4a311c;
            border-radius: 16px;
            box-shadow: 0 12px 0 #28190e, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 游戏屏幕（增加 CRT 显像管扫描线效果） */
        #game-screen {
            background: linear-gradient(to bottom, #fcd0a1, #e39f67); 
            border: 6px solid #4a311c;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        /* CRT 扫描线和像素颗粒滤镜 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            z-index: 5;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* 像素风状态栏 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4a311c, -1px -1px 0px #4a311c, 1px -1px 0px #4a311c, -1px 1px 0px #4a311c;
        }

        .bar-label { width: 45px; }
        
        /* 像素格子化进度条 */
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e5c39c;
            border: 3px solid #4a311c;
            margin-left: 5px;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        .pixel-bar-fill {
            height: 100%;
            background: #ff3c00; 
            width: 60%;
            transition: width-change 0.3s;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2);
        }
        #affection-bar { background: #ff3399; }

        /* 咻咻猫精灵图（支持旋转转身） */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04, 0.96) translateY(2px); }
        }

        svg.cat-sprite {
            width: 170px;
            height: 170px;
            animation: breathe 3.5s infinite ease-in-out;
            image-rendering: pixelated;
        }

        .emoji-effect {
            position: absolute;
            font-size: 28px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
        }

        /* 游戏对话框 */
        #dialogue-box {
            background: #181410;
            border: 4px solid #fff;
            outline: 2px solid #181410;
            border-radius: 4px;
            height: 110px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #speaker {
            font-size: 11px;
            color: #ffb834;
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #00ffcc; 
            overflow-y: auto;
            flex-grow: 1;
        }

        /* 控制按钮 */
        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #d49a55;
            border: 3px solid #4a311c;
            border-radius: 4px;
            color: #2c190a;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #a46d2f, 2px 2px 0px #2c190a;
            outline: none;
        }

        .pixel-btn:active {
            box-shadow: inset 2px 2px 0px #a46d2f;
            transform: translate(1px, 1px);
        }

        #btn-poke {
            background: #5398d9;
            border-color: #224363;
            box-shadow: inset -2px -2px 0px #2f6ea6, 2px 2px 0px #14273b;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #181410;
            border: 3px solid #4a311c;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #3fa143;
            color: white;
            border: 3px solid #1f5e22;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-console">
        <div id="game-screen">
            <!-- 状态面板 -->
            <div id="status-bars">
                <div class="bar-container">
                    <span class="bar-label">🐟 饱食</span>
                    <div class="pixel-bar-bg">
                        <div id="hunger-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <span class="bar-label">❤️ 好感</span>
                    <div class="pixel-bar-bg">
                        <div id="affection-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <!-- 重新手绘：高级 16-bit 像素风格猫咪 & 猫窝 -->
            <div id="sprite-container">
                <svg class="cat-sprite" viewBox="0 0 100 100">
                    <!-- 1. 蓬松的 3D 渐变色橘色甜甜圈猫窝 -->
                    <ellipse cx="50" cy="85" rx="44" ry="13" fill="#8e2f00" />
                    <ellipse cx="50" cy="82" rx="42" ry="12" fill="#d35400" />
                    <ellipse cx="50" cy="80" rx="38" ry="10" fill="#e67e22" />
                    <ellipse cx="50" cy="78" rx="30" ry="7" fill="#f39c12" />
                    
                    <!-- 2. 胖乎乎的狸花猫身体（增加了暗部阴影） -->
                    <ellipse cx="50" cy="56" rx="25" ry="22" fill="#8a4d29" />
                    <ellipse cx="50" cy="54" rx="23" ry="20" fill="#a0522d" />
                    
                    <!-- 身体上的虎斑条纹（更精致的像素排列） -->
                    <path d="M28 46 Q36 49 39 51" stroke="#3e2723" stroke-width="2.5" fill="none" />
                    <path d="M72 46 Q64 49 61 51" stroke="#3e2723" stroke-width="2.5" fill="none" />
                    <path d="M27 56 Q36 57 38 59" stroke="#3e2723" stroke-width="2.5" fill="none" />
                    <path d="M73 56 Q64 57 62 59" stroke="#3e2723" stroke-width="2.5" fill="none" />

                    <!-- 3. 大宽脸蛋和头部 -->
                    <circle cx="50" cy="35" r="19" fill="#8a4d29" />
                    <circle cx="50" cy="33" r="18" fill="#a0522d" />
                    
                    <!-- 脸颊两侧的狸花胡须纹路 -->
                    <path d="M33 30 Q39 31 41 32" stroke="#3e2723" stroke-width="2" fill="none" />
                    <path d="M67 30 Q61 31 59 32" stroke="#3e2723" stroke-width="2" fill="none" />

                    <!-- 4. 可爱的猫耳朵（带粉色内耳） -->
                    <polygon points="31,22 41,8 43,21" fill="#3e2723" />
                    <polygon points="33,21 39,11 41,20" fill="#fbb" />
                    <polygon points="69,22 59,8 57,21" fill="#3e2723" />
                    <polygon points="67,21 61,11 59,20" fill="#fbb" />
                    
                    <!-- 5. 亮晶晶的绿宝石大眼睛（双重像素高光，萌度大增） -->
                    <circle cx="41" cy="29" r="4" fill="#2ecc71" />
                    <circle cx="41" cy="29" r="2.5" fill="#27ae60" />
                    <circle cx="40" cy="28" r="1" fill="#fff" /> <!-- 主高光 -->
                    <circle cx="42" cy="30" r="0.5" fill="#fff" /> <!-- 辅高光 -->

                    <circle cx="59" cy="29" r="4" fill="#2ecc71" />
                    <circle cx="59" cy="29" r="2.5" fill="#27ae60" />
                    <circle cx="58" cy="28" r="1" fill="#fff" />
                    <circle cx="60" cy="30" r="0.5" fill="#fff" />

                    <!-- 6. 标志性的雪白嘴唇和下巴 (Muzzle) -->
                    <ellipse cx="45" cy="37" rx="4.5" ry="3.5" fill="#ffffff" />
                    <ellipse cx="55" cy="37" rx="4.5" ry="3.5" fill="#ffffff" />
                    <ellipse cx="50" cy="39" rx="5" ry="3.5" fill="#ffffff" />
                    <!-- 小粉鼻 -->
                    <polygon points="48,35 52,35 50,37" fill="#ffb6c1" />
                    <!-- 喵咪小猫嘴 -->
                    <path d="M46 38.5 Q50 41 54 38.5" stroke="#3e2723" stroke-width="1.2" fill="none" />

                    <!-- 7. 萌萌的前爪（一只穿了可爱的白色手套） -->
                    <circle cx="43" cy="74" r="5" fill="#8a4d29" />
                    <circle cx="43" cy="73" r="4.5" fill="#a0522d" />
                    
                    <circle cx="57" cy="74" r="5" fill="#dcdde1" /> <!-- 白手套部分 -->
                    <circle cx="57" cy="73" r="4.5" fill="#ffffff" />
                </svg>
            </div>
        </div>

        <!-- 对话框 -->
        <div id="dialogue-box">
            <div>
                <div id="speaker">咻咻猫</div>
                <div id="text-content">咻！你来啦！[在橘色猫窝里摇尾巴] 抱抱咻咻好不好？（提示：请确认代码中第 13 行为你真实的 Key 哟！）</div>
            </div>
        </div>

        <!-- 按键 -->
        <div id="buttons-panel">
            <button class="pixel-btn" onclick="interact('feed')">🐟 喂鱼干</button>
            <button class="pixel-btn" onclick="interact('pet')">✋ 摸摸头</button>
            <button class="pixel-btn" onclick="interact('play')">🌿 逗猫棒</button>
            <button class="pixel-btn" id="btn-poke" onclick="interact('poke')">👉 戳一戳</button>
        </div>

        <!-- 聊天 -->
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="和咻咻猫说点什么..." onkeydown="if(event.key === 'Enter') submitChat()">
            <button id="chat-submit" onclick="submitChat()">发送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 在这里直接内置你的大模型配置
        // ==========================================
        const CONFIG = {
            apiKey: "在这里填入你的_DEEPSEEK_API_KEY", // 👈 替换这行双引号里的文字即可
            apiUrl: "https://api.deepseek.com/v1", 
            apiModel: "deepseek-chat" 
        };
        // ==========================================

        const state = {
            hunger: 60,
            affection: 60,
            isIgnoring: false,  
            ignoreCount: 0      
        };

        window.onload = function() {
            const settingsBtn = document.getElementById('settings-btn');
            if (settingsBtn) settingsBtn.style.display = 'none'; 
        };

        // 调用大模型对话接口
        async function fetchAIResponse(userMessage) {
            if (!CONFIG.apiKey || CONFIG.apiKey.includes("sk-7ab387a1cb474f6db6976ea3a8aef8f5")) {
                return localFallbackChat(userMessage);
            }

            const systemPrompt = `
                你是一只名叫“咻咻猫”的16位复古游戏像素风电子宠物猫。
                外观：你是一只胖乎乎的棕色狸花猫，有着亮晶晶的翠绿色大眼睛，标志性的干净白胡须垫（白嘴巴、白下巴）。你正端坐在温暖的橘色猫窝里。
                性格：极度傲娇、口嫌体正直、对主人依赖但嘴上坚决不承认。说话喜欢带“咻”、“咻呜”的尾音，动作描述放在方括号[]里。
                
                当下的实时游戏属性状态：
                - 饱食度: ${state.hunger}/100（如果饱食度低于30，请在对话中委婉或傲娇地抱怨肚子空空）
                - 好感度: ${state.affection}/100（如果好感度低，你需要更冷酷；高的时候可以稍微害羞和松口）
                - 是否在生气背对主人: ${state.isIgnoring ? '是' : '否'}

                限制规则：
                1. 严格使用猫咪视角和设定的傲娇语气回复。
                2. 每次回答字数限制在 60 字以内，简短精炼。
                3. 如果主人提到了天气，你可以假设外面的天气，或者用傲娇语气进行调侃。
            `;

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userMessage }
                        ],
                        max_tokens: 150,
                        temperature: 0.8
                    })
                });

                if (!response.ok) {
                    // 如果返回了非200的状态码，直接抛出，让捕获块打印具体代码
                    const errText = await response.text();
                    throw new Error(`[HTTP ${response.status}] - ${errText || '未知错误'}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                console.error(err);
                // 把真实的报错原因打印在屏幕上，以便定位为什么 API 连不上
                return `咻呜……刚才信号开小差了，脑电波没接上。\n【报错原因】：${err.message}`;
            }
        }

        // 本地降级简易对话（在没有配置 Key 时备用）
        function localFallbackChat(text) {
            if (text.includes("你好") || text.includes("嗨") || text.includes("喂")) {
                return "咻！你好。盯着咻咻的白嘴唇干嘛？没看过这么标志的猫咪吗？";
            } else if (text.includes("可爱") || text.includes("漂亮") || text.includes("胖")) {
                return "咻呜~ [害羞地把头埋进橘色猫窝里] 别以为夸我，我就会把小鱼干让给你！";
            } else {
                return "咻？听不懂你在说什么。快拿好吃的或者陪我玩，不然不理你了！";
            }
        }

        // 核心交互逻辑
        async function interact(action) {
            let reply = "";
            let emoji = "";

            if (state.isIgnoring && action !== 'poke') {
                reply = "…… [咻咻猫固执地背对着你，只露出一截微动的黑尾巴尖，似乎在等你跟它道歉] 哼。";
                updateUI(reply, "💢");
                return;
            }

            if (action === 'feed') {
                state.hunger = Math.min(100, state.hunger + 20);
                state.affection = Math.min(100, state.affection + 5);
                reply = "咻！鱼干真香！[在橘色猫窝里满足地舔了舔白色的嘴唇] 算你识相！";
                emoji = "🍖";
                tryToTriggerIgnore(0.2); 
            } else if (action === 'pet') {
                state.affection = Math.min(100, state.affection + 12);
                reply = "呼噜呼噜……[它很舒服，但傲娇地转头] 哼，只是看在你这么诚恳的份上才让你摸的！";
                emoji = "❤️";
                tryToTriggerIgnore(0.3); 
            } else if (action === 'play') {
                state.hunger = Math.max(0, state.hunger - 10);
                state.affection = Math.min(100, state.affection + 10);
                reply = "咻！抓到了！[在窝里飞快出爪] 本、本喵才不是想玩，只是在帮你除掉这片羽毛！";
                emoji = "✨";
            } else if (action === 'poke') {
                if (state.isIgnoring) {
                    state.ignoreCount--;
                    if (state.ignoreCount <= 0) {
                        state.isIgnoring = false;
                        state.affection = Math.min(100, state.affection + 15);
                        reply = "好啦好啦！真拿你没办法！[有些别扭地转回大圆脸] 讨厌，衣服都被你戳乱了，咻呜！";
                        emoji = "✨";
                        document.getElementById('sprite-container').classList.remove('tsundere-ignore');
                    } else {
                        reply = `不要乱戳！[咻咻猫耸了耸毛，固执地不肯转过来，看样子还要戳 ${state.ignoreCount} 次]`;
                        emoji = "💢";
                    }
                } else {
                    reply = "哎呀！[转头用大绿眼睛瞪你] 别戳我！再戳咻咻可要生气不理你了！";
                    emoji = "❔";
                    tryToTriggerIgnore(0.4); 
                }
            }

            updateUI(reply, emoji);
        }

        function tryToTriggerIgnore(chance) {
            if (state.isIgnoring) return;
            if (Math.random() < chance) {
                state.isIgnoring = true;
                state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                document.getElementById('sprite-container').classList.add('tsundere-ignore');
                setTimeout(() => {
                    updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在猫窝里] 咻咻决定不理你了，除非你戳它道歉！", "💢");
                }, 500);
            }
        }

        // 发送自由文字对话
        async function submitChat() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = ""; 
            state.hunger = Math.max(0, state.hunger - 5);

            if (state.isIgnoring) {
                updateUI("…… [咻咻猫一动不动，尾巴冷淡地在猫窝外甩了一下，似乎完全不想理你]", "💤");
                return;
            }

            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            const reply = await fetchAIResponse(text);
            
            updateUI(reply, "💬");
        }

        function updateUI(replyText, emoji) {
            document.getElementById('hunger-bar').style.width = state.hunger + '%';
            document.getElementById('affection-bar').style.width = state.affection + '%';
            document.getElementById('text-content').innerText = replyText;

            if (emoji) {
                const screen = document.getElementById('game-screen');
                const effect = document.createElement('div');
                effect.className = 'emoji-effect';
                effect.innerText = emoji;
                effect.style.left = state.isIgnoring ? '40%' : '60%';
                effect.style.top = '50%';
                screen.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
            }
        }
    </script>
</body>
</html>
