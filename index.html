<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); 
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        .bar-label {
            display: flex;
            align-items: center;
            gap: 6px;                
            white-space: nowrap;     
            min-width: 65px;         
            margin-right: 5px;       
        }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
        }

        .pixel-bar-fill {
            height: 100%;
            width: 60%;
            transition: width 0.3s, background-color 0.5s;
        }

        /* 精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        /* ------------------------------------------
           🎬 四种情绪姿态的 16-bit 像素动画系统 
           ------------------------------------------ */
        
        /* 1. 默认正常状态：3.5秒平缓呼吸 */
        #sprite-container.state-normal svg.cat-sprite {
            animation: breathe-normal 3.5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-normal {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        /* 2. 犯困状态：5秒超慢呼吸 */
        #sprite-container.state-sleepy svg.cat-sprite {
            animation: breathe-sleepy 5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-sleepy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.01, 0.99) translateY(1px); }
        }

        /* 3. 生气暴躁状态：1.5秒急促呼吸 + 震颤摇晃 */
        #sprite-container.state-angry svg.cat-sprite {
            animation: breathe-angry 1.5s infinite ease-in-out, shake-angry 0.15s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-angry {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04, 0.96) translateY(2px); }
        }
        @keyframes shake-angry {
            0% { transform: translate(-1px, 0) rotate(-0.5deg); }
            100% { transform: translate(1px, 0) rotate(0.5deg); }
        }

        /* 4. 开心状态：2秒雀跃起伏 + 上下弹跳 */
        #sprite-container.state-happy svg.cat-sprite {
            animation: breathe-happy 2s infinite ease-in-out, bounce-happy 1s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-happy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05, 0.95) translateY(1px); }
        }
        @keyframes bounce-happy {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); } 
        }

        /* 强制重置所有特殊表情图层，规避浏览器渲染引擎的 display 转换冲突 */
        .eye-sleepy, .eye-angry, .eyebrow-angry, .eye-happy, 
        .ear-sleepy, .ear-angry, .blush-happy {
            display: none !important;
        }

        /* 犯困状态强制显示 */
        #sprite-container.state-sleepy .eye-sleepy,
        #sprite-container.state-sleepy .ear-sleepy { display: inline !important; }
        #sprite-container.state-sleepy .eye-open,
        #sprite-container.state-sleepy .eye-open-pupil,
        #sprite-container.state-sleepy .ear-normal { display: none !important; }

        /* 生气状态强制显示 */
        #sprite-container.state-angry .eye-angry,
        #sprite-container.state-angry .eyebrow-angry,
        #sprite-container.state-angry .ear-angry { display: inline !important; }
        #sprite-container.state-angry .eye-open,
        #sprite-container.state-angry .eye-open-pupil,
        #sprite-container.state-angry .ear-normal { display: none !important; }

        /* 开心撒娇状态强制显示 */
        #sprite-container.state-happy .eye-happy,
        #sprite-container.state-happy .blush-happy { display: inline !important; }
        #sprite-container.state-happy .eye-open,
        #sprite-container.state-happy .eye-open-pupil { display: none !important; }


        /* 优化后的对话框布局 */
        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 8px 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; 
            font-weight: bold;
            letter-spacing: 1px;
            flex-shrink: 0; /* 名字固定高度，决不被压缩 */
        }

        /* 自适应像素滚动对话栏 */
        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; 
            overflow-y: auto; /* 文本过长时自动触发垂直滚动 */
            flex-grow: 1;
        }

        /* 🎨 16-bit 专属复古风滚动条美化 */
        #text-content::-webkit-scrollbar {
            width: 6px;
        }
        #text-content::-webkit-scrollbar-track {
            background: #1a1512;
        }
        #text-content::-webkit-scrollbar-thumb {
            background: #ab825f;
            border: 1px solid #4e3522;
            border-radius: 2px;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; 
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active:not(:disabled) {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        /* 禁用时的像素置灰样式 */
        .pixel-btn:disabled {
            background: #a0828c !important;
            border-color: #5a4b40 !important;
            color: #605058 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>

    <script>
        // ==========================================
        // ⚙️ 安全云代理接口配置
        // ==========================================

        const CONFIG = {
            // 1. 👈 将这里的地址替换为您最新的 Hugging Face 代理地址
            apiUrl: "https://wly948948-xiuxiu.hf.space", 
            
            apiModel: "Qwen/Qwen2.5-7B-Instruct",
            apiKey: "SAFE_CLOUDFLARE_PROXY_ACTIVE" 
        };

        // ==========================================
        // ✍️ 仿游戏 RPG 打字机排版显示引擎（优化版）
        // ==========================================
        let typewriterTimer = null;
        let currentFullText = "";
        let isWriting = false;
        let currentTargetId = ""; // 👈 新增：记录当前正在写入的容器 ID

        function renderText(targetId, text, speed = 25) {
            const container = document.getElementById(targetId);
            if (!container) return;

            // 终止上一轮打印
            if (typewriterTimer) {
                clearInterval(typewriterTimer);
            }

            currentFullText = text;
            currentTargetId = targetId; // 👈 记录当前目标
            isWriting = true;
            container.innerText = "";
            
            let index = 0;
            typewriterTimer = setInterval(() => {
                if (index < text.length) {
                    container.innerText += text[index];
                    index++;
                    container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(typewriterTimer);
                    isWriting = false;
                }
            }, speed);
        }

        // 允许玩家点击对话框瞬间跳过打字效果，直接展示全文本
        function skipTypewriting() {
            if (isWriting && currentTargetId) { // 👈 使用动态记录的 ID
                if (typewriterTimer) clearInterval(typewriterTimer);
                const container = document.getElementById(currentTargetId);
                if (container) {
                    container.innerText = currentFullText;
                    container.scrollTop = container.scrollHeight;
                }
                isWriting = false;
            }
        }

        // ==========================================
        // 🧠 记忆读取存档函数
        function loadSavedState() {
            try {
                const saved = localStorage.getItem('xiuxiu_pet_state_v7');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return {
                        hunger: parsed.hunger !== undefined ? parsed.hunger : 60,
                        affection: parsed.affection !== undefined ? parsed.affection : 60,
                        isIgnoring: parsed.isIgnoring !== undefined ? parsed.isIgnoring : false,
                        ignoreCount: parsed.ignoreCount !== undefined ? parsed.ignoreCount : 0,
                        isProcessing: false,
                        chatHistory: parsed.chatHistory || [],
                        lastUserEmotion: parsed.lastUserEmotion || 'normal' // 🧠 记录上一次用户情绪分类 ('normal' | 'negative')
                    };
                }
            } catch (e) {
                console.error("读取存档失败，启用全新状态:", e);
            }
            return {
                hunger: 60,
                affection: 60,
                isIgnoring: false,  
                ignoreCount: 0,
                isProcessing: false,
                chatHistory: [],
                lastUserEmotion: 'normal'
            };
        }

        // 初始化状态
        const state = loadSavedState();

        // 🧠 写入存档
        function saveCurrentState() {
            try {
                const toSave = {
                    hunger: state.hunger,
                    affection: state.affection,
                    isIgnoring: state.isIgnoring,
                    ignoreCount: state.ignoreCount,
                    chatHistory: state.chatHistory,
                    lastUserEmotion: state.lastUserEmotion
                };
                localStorage.setItem('xiuxiu_pet_state_v7', JSON.stringify(toSave));
            } catch (e) {
                console.error("存档写入失败:", e);
            }
        }

        // 🌟 开机随机寄语
        const greetings = [
            "咻呜！小王你终于舍得开机了？[从粉色地板上慢吞吞地爬起来，伸了个腰] 本喵等得胡子都歪了！",
            "咻！[傲娇地抬起大圆头，抖了抖红粉色耳心] 别一直盯着本喵看。本喵今天心情好，才勉为其难在这里等你的，小王！",
            "哼，你来啦？[缩成一个巧克力色的大毛球，耳朵轻快地转了转] 肚子好像有点咕噜噜了，小王，你懂我的意思吧？咻呜~",
            "咻！新衣服合身吗？[在浅粉色房间里摇了摇巧克力色的大尾巴] 这次和照片上一模一样了吧！咻呜~",
            "十年了，小王你还是每天这个时间来守着我。[有些不好意思地用白色爪子刨了刨地板] 哼，本喵才没有在特意等你呢！"
        ];

        // 唤醒咻咻
        function wakeupXiuXiu() {
            const textContent = document.getElementById('text-content');
            if (textContent) {
                if (state.chatHistory && state.chatHistory.length > 0) {
                    const lastTurn = state.chatHistory[state.chatHistory.length - 1];
                    if (lastTurn && lastTurn.role === "assistant") {
                        textContent.innerText = `[接上回] ${lastTurn.content}`;
                        updateVisualState();
                        return;
                    }
                }
                const randomIndex = Math.floor(Math.random() * greetings.length);
                textContent.innerText = greetings[randomIndex];
            }
            updateVisualState();
        }
        wakeupXiuXiu();

        // 情绪动画控制引擎
        function setVisualState(stateName) {
            const container = document.getElementById('sprite-container');
            if (!container) return;

        // 获取时间
        function getCurrentDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const dayOfWeek = dayNames[now.getDay()];
            
            let timePeriod = "深夜";
            if (hours >= 5 && hours < 8) timePeriod = "清晨";
            else if (hours >= 8 && hours < 11) timePeriod = "上午";
            else if (hours >= 11 && hours < 13) timePeriod = "中午";
            else if (hours >= 13 && hours < 17) timePeriod = "下午";
            else if (hours >= 17 && hours < 19) timePeriod = "傍晚";
            else if (hours >= 19 && hours < 23) timePeriod = "晚上";

            return `${year}年${month}月${date}日 ${dayOfWeek} ${timePeriod} ${hours}:${minutes}`;
        }

            }
        }

        function tryToTriggerIgnore(chance) {
            return new Promise((resolve) => {
                // 🧠 双子系统核心：如果主人最近处于消极情绪状态，或者当前输入有消极色彩，绝对不触发傲娇无视！
                if (state.lastUserEmotion === 'negative') {
                    resolve();
                    return;
                }
                if (state.isIgnoring) {
                    resolve();
                    return;
                }
                if (Math.random() < chance) {
                    state.isIgnoring = true;
                    state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                    
                    const container = document.getElementById('sprite-container');
                    if (container) container.classList.add('tsundere-ignore');
                    
                    setTimeout(() => {
                        updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在粉色地板上] 咻咻决定不理你了！\n（💡提示：小猫生气的时候很好哄哦，点击【👉 戳一戳】逗逗它就好啦！）", "💢");
                        resolve();
                    }, 500);
                } else {
                    resolve();
                }
            });
        }

        // 发送文字对话
        async function submitChat() {
            if (state.isProcessing) return;

            const inputEl = document.getElementById('chat-input');
            if (!inputEl) return;
            
            const text = inputEl.value.trim();
            if (!text) return;

            // 1. 安全洗涤 Key
            const cleanKey = getStrictCleanKey();
            const isDefaultOrInvalid = !cleanKey || 
                                       cleanKey.length < 15 || 
                                       cleanKey.includes("API_KEY");

            // 🧠 情绪分析：捕捉用户是否流露消极低落情绪
            const isNegative = /(累|烦|难过|哭|不开心|伤心|失败|委屈|倒霉|绝望|压力|无用|傻|笨|疼|割破|流血|受伤)/i.test(text);
            state.lastUserEmotion = isNegative ? 'negative' : 'normal';

            // 2. 消耗饱食度
            state.hunger = Math.max(0, state.hunger - 5);

            // 3. 生气背对状态拦截（如果是消极词汇，强行破冰，强迫猫咪转过来安慰）
            if (state.isIgnoring) {
                if (isNegative) {
                    state.isIgnoring = false;
                    state.ignoreCount = 0;
                    const container = document.getElementById('sprite-container');
                    if (container) container.classList.remove('tsundere-ignore');
                }
            }

            // 🧠 将用户当前的本轮输入压入历史记忆队列
            state.chatHistory.push({ role: "user", content: text });
            if (state.chatHistory.length > 10) {
                state.chatHistory.shift(); 
            }

            // 4. 离线模式判定
            if (isDefaultOrInvalid) {
                inputEl.value = "";
                const reply = localFallbackChat(text);
                state.chatHistory.push({ role: "assistant", content: reply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();
                
                // 离线情况下，如果检测到数学运算/主动追问，给一个智慧的 blink 眨眼动画
                if (text.match(/\d+[\+\-\*\/]\d+/) || isNegative) {
                    triggerTempVisualState('happy', 2000);
                }
                
                updateUI(reply, "💬");
                return;
            }

            // 5. 在线通信：锁定界面，请求 API
            setInteractiveState(false); 
            inputEl.value = ""; 
            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            try {
                const reply = await fetchAIResponse(text);
                
                // 🧠 将大模型返回的猫咪话语也记入历史队列中
                state.chatHistory.push({ role: "assistant", content: reply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();

                updateUI(reply, "💬");
            } catch (err) {
                console.error("Chat Submit Error:", err);
                const fallbackReply = localFallbackChat(text);
                // 联网失败的单机降级对话同样存入记忆队列，确保思路连贯
                state.chatHistory.push({ role: "assistant", content: fallbackReply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();
                
                updateUI(fallbackReply, "❌");
            } finally {
                setInteractiveState(true); 
            }
        }

        function updateUI(replyText, emoji) {
            const hungerBar = document.getElementById('hunger-bar');
            const affectionBar = document.getElementById('affection-bar');
            const textContent = document.getElementById('text-content');

            // 动态变色：当饱食度或好感度低于30时，血条会变红/灰，给用户强烈的视觉紧迫感
            if (hungerBar) {
                hungerBar.style.width = state.hunger + '%';
                if (state.hunger < 30) {
                    hungerBar.style.backgroundColor = '#a83b3b'; // 饥饿暗红
                } else {
                    hungerBar.style.backgroundColor = '#ff5e7e'; // 正常粉红
                }
            }
            if (affectionBar) {
                affectionBar.style.width = state.affection + '%';
                if (state.affection < 30) {
                    affectionBar.style.backgroundColor = '#5c4349'; // 冰点冷灰
                } else {
                    affectionBar.style.backgroundColor = '#ff2a85'; // 正常爱心红
                }
            }

            if (textContent) {
                textContent.innerText = replyText;
                
                // 👑 自动向上滚动核心：每次渲染新对白，容器都自动滑到底部，前面的字整齐上滚
                setTimeout(() => {
                    textContent.scrollTop = textContent.scrollHeight;
                }, 50);
            }

            // 🧠 每次状态发生改变时，自动将状态写入本地 LocalStorage 存档
            saveCurrentState();

            // 动态重估并刷新猫咪的外在基准表情动画
            updateVisualState();

            if (emoji) {
                const screen = document.getElementById('game-screen');
                if (screen) {
                    const effect = document.createElement('div');
                    effect.className = 'emoji-effect';
                    effect.innerText = emoji;
                    effect.style.left = state.isIgnoring ? '40%' : '60%';
                    effect.style.top = '50%';
                    screen.appendChild(effect);
                    setTimeout(() => effect.remove(), 1000);
                }
            }
        }
    </script>
