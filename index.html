<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 像素猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 游戏屏幕：更换为精美的浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); /* 浅粉色渐变 */
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果（对像素画面有加成） */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板（适配粉色主题） */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        .bar-label { width: 45px; }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
            margin-left: 5px;
        }

        .pixel-bar-fill {
            height: 100%;
            background: #ff5e7e; /* 饱食度采用明亮的粉色 */
            width: 60%;
            transition: width 0.3s;
        }
        #affection-bar { background: #ff2a85; }

        /* 咻咻猫精灵图容器（支持翻转傲娇） */
        #sprite-container {
            position: absolute;
            bottom: 20px;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        /* 严格按照拼豆照片网格重绘的 16-bit 像素小猫 */
        svg.cat-sprite {
            width: 150px;
            height: 150px;
            animation: breathe 3.5s infinite ease-in-out;
            shape-rendering: crispEdges; /* 核心：让像素绝对清晰，不模糊 */
        }

        .emoji-effect {
            position: absolute;
            font-size: 28px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
        }

        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; /* 粉色字体 */
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; /* 浅粉色文字 */
            overflow-y: auto;
            flex-grow: 1;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; /* 浅粉纽扣 */
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-console">
        <div id="game-screen">
            <!-- 状态面板 -->
            <div id="status-bars">
                <div class="bar-container">
                    <span class="bar-label">🐟 饱食</span>
                    <div class="pixel-bar-bg">
                        <div id="hunger-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <span class="bar-label">❤️ 好感</span>
                    <div class="pixel-bar-bg">
                        <div id="affection-bar" class="pixel-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <!-- 完全对照拼豆实物图重绘的像素猫咪（使用精密的像素方块渲染） -->
            <div id="sprite-container">
                <svg class="cat-sprite" viewBox="0 0 32 32">
                    <!-- 像素色盘说明：
                         #111111: 深色描边
                         #6b6b6b: 深灰条纹
                         #a2a2a2: 浅灰底色
                         #ffffff: 脸上和肚子的白色部分
                         #ff4c4c: 拼豆左耳内侧的亮红色块
                    -->
                    
                    <!-- 翘起的尾巴 -->
                    <rect x="3" y="10" width="3" height="3" fill="#111111" />
                    <rect x="3" y="13" width="3" height="7" fill="#6b6b6b" />
                    <rect x="4" y="14" width="2" height="5" fill="#a2a2a2" />
                    <rect x="3" y="20" width="3" height="3" fill="#111111" />
                    
                    <!-- 左耳朵（带红色拼豆方块） -->
                    <polygon points="10,5 15,5 15,10 10,10" fill="#111111" />
                    <polygon points="11,6 14,6 14,9 11,9" fill="#ff4c4c" /> <!-- 经典红耳心 -->
                    
                    <!-- 右耳朵 -->
                    <polygon points="21,1 26,1 26,7 21,7" fill="#111111" />
                    <polygon points="22,2 25,2 25,6 22,6" fill="#6b6b6b" />

                    <!-- 猫咪头部主体与大脸盘 -->
                    <rect x="9" y="8" width="16" height="11" fill="#111111" />
                    <rect x="10" y="9" width="14" height="9" fill="#a2a2a2" />
                    
                    <!-- 灰色斑纹（额头和脸颊） -->
                    <rect x="13" y="9" width="2" height="3" fill="#6b6b6b" />
                    <rect x="18" y="9" width="3" height="3" fill="#6b6b6b" />
                    <rect x="10" y="12" width="3" height="2" fill="#6b6b6b" />
                    <rect x="22" y="12" width="2" height="2" fill="#6b6b6b" />

                    <!-- 脸上大面积的白色区域（完美对齐照片） -->
                    <rect x="15" y="12" width="8" height="6" fill="#ffffff" />
                    <rect x="13" y="14" width="2" height="3" fill="#ffffff" />
                    
                    <!-- 黑色小眼睛 -->
                    <rect x="14" y="13" width="2" height="2" fill="#111111" />
                    <rect x="20" y="13" width="2" height="2" fill="#111111" />
                    
                    <!-- 嘴唇区域 -->
                    <rect x="17" y="15" width="3" height="1" fill="#111111" />
                    
                    <!-- 胖乎乎的猫身体 -->
                    <rect x="6" y="17" width="18" height="10" fill="#111111" />
                    <rect x="7" y="18" width="16" height="8" fill="#a2a2a2" />
                    
                    <!-- 身体上的深灰色条纹 -->
                    <rect x="8" y="19" width="3" height="4" fill="#6b6b6b" />
                    <rect x="13" y="19" width="4" height="4" fill="#6b6b6b" />
                    <rect x="19" y="19" width="3" height="4" fill="#6b6b6b" />
                    
                    <!-- 肚皮白色 -->
                    <rect x="10" y="23" width="8" height="3" fill="#ffffff" />

                    <!-- 四条萌萌的像素小短腿（带白手套） -->
                    <!-- 前左腿 -->
                    <rect x="7" y="25" width="4" height="4" fill="#111111" />
                    <rect x="8" y="26" width="2" height="3" fill="#ffffff" />
                    
                    <!-- 前右腿（踏步态） -->
                    <rect x="12" y="25" width="4" height="4" fill="#111111" />
                    <rect x="13" y="26" width="2" height="3" fill="#ffffff" />
                    
                    <!-- 后左腿 -->
                    <rect x="17" y="25" width="4" height="4" fill="#111111" />
                    <rect x="18" y="26" width="2" height="3" fill="#a2a2a2" />
                    
                    <!-- 后右腿 -->
                    <rect x="21" y="25" width="4" height="4" fill="#111111" />
                    <rect x="22" y="26" width="2" height="3" fill="#ffffff" />
                </svg>
            </div>
        </div>

        <div id="dialogue-box">
            <div>
                <div id="speaker">咻咻猫</div>
                <div id="text-content">咻！好看吗？[在浅粉色房间里高高地翘起斑纹尾巴] 咻咻觉得这个新造型超级酷！咻呜~</div>
