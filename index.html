<script>
        // ==========================================
        // ⚙️ 接口配置（安全优化：优先从本地浏览器存储读取 Key，防止 GitHub 泄露）
        // ==========================================
        const CONFIG = {
            apiKey: localStorage.getItem('sk-ephvdecvurhviermvzutqqegqessydmogyjjhlgzghzdxvwz') || "", 
            apiUrl: "https://api.siliconflow.cn/v1", 
            apiModel: "Qwen/Qwen2.5-7B-Instruct"     
        };
        // ==========================================

        // ==========================================
        // 💾 长期记忆管理器 (MemoryManager) - 满足需求 2
        // ==========================================
        const MemoryManager = {
            getMemory() {
                try {
                    return JSON.parse(localStorage.getItem('xiuxiu_longterm_memory') || '[]');
                } catch(e) {
                    return [];
                }
            },
            saveMemory(memories) {
                localStorage.setItem('xiuxiu_longterm_memory', JSON.stringify(memories));
            },
            addMemory(fact) {
                let memories = this.getMemory();
                // 过滤重复记忆
                if (!memories.some(m => m.toLowerCase() === fact.toLowerCase())) {
                    memories.push(fact);
                    // 长期记忆最多保持 8 条核心记录
                    if (memories.length > 8) memories.shift();
                    this.saveMemory(memories);
                }
            },
            getMemoryPrompt() {
                const memories = this.getMemory();
                if (memories.length === 0) return "暂无关于主人的特别记录。";
                return memories.map((m, idx) => `- ${m}`).join('\n');
            }
        };

        // 🧠 记忆读取与游戏状态存档加载
        function loadSavedState() {
            try {
                const saved = localStorage.getItem('xiuxiu_pet_state_v9');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return {
                        hunger: parsed.hunger !== undefined ? parsed.hunger : 60,
                        affection: parsed.affection !== undefined ? parsed.affection : 60,
                        isIgnoring: parsed.isIgnoring !== undefined ? parsed.isIgnoring : false,
                        ignoreCount: parsed.ignoreCount !== undefined ? parsed.ignoreCount : 0,
                        isProcessing: false,
                        chatHistory: parsed.chatHistory || [],
                        summary: parsed.summary || "", // 自动生成的上下文摘要
                        lastUserEmotion: parsed.lastUserEmotion || 'normal'
                    };
                }
            } catch (e) {
                console.error("读取存档失败，启用全新状态:", e);
            }
            return {
                hunger: 60,
                affection: 60,
                isIgnoring: false,  
                ignoreCount: 0,
                isProcessing: false,
                chatHistory: [],
                summary: "",
                lastUserEmotion: 'normal'
            };
        }

        // 初始化状态
        const state = loadSavedState();

        // 🧠 写入存档
        function saveCurrentState() {
            try {
                const toSave = {
                    hunger: state.hunger,
                    affection: state.affection,
                    isIgnoring: state.isIgnoring,
                    ignoreCount: state.ignoreCount,
                    chatHistory: state.chatHistory,
                    summary: state.summary,
                    lastUserEmotion: state.lastUserEmotion
                };
                localStorage.setItem('xiuxiu_pet_state_v9', JSON.stringify(toSave));
            } catch (e) {
                console.error("存档写入失败:", e);
            }
        }

        // 统一控制历史记录，保障轮次规范
        function addChatHistory(role, content) {
            state.chatHistory.push({ role: role, content: content });
            
            // 确保历史记录的第一条永远是 user 角色，防止大模型接口报错 400
            while (state.chatHistory.length > 0 && state.chatHistory[0].role !== 'user') {
                state.chatHistory.shift();
            }
        }

        // ==========================================
        // 💬 对话历史管理与自动摘要机制 - 满足需求 3
        // ==========================================
        async function summarizeOldHistory() {
            // 当对话条数超过 10 条（5轮完整对话）时触发后台自动压缩
            if (state.chatHistory.length <= 10) return;

            const cleanKey = getStrictCleanKey();
            if (!cleanKey) return;

            // 截取最老的 4 条对话进行摘要，保留剩余的继续用作直接上下文
            const toSummarize = state.chatHistory.slice(0, 4);
            state.chatHistory = state.chatHistory.slice(4);

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cleanKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: [
                            { role: "system", content: "请简要总结以下对话的内容，保留重要事件、约定、主人喜好或对话线索。控制在50字以内，直接输出总结内容。" },
                            { role: "user", content: JSON.stringify(toSummarize) }
                        ],
                        max_tokens: 100,
                        temperature: 0.3
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const newSummary = data.choices[0].message.content.trim();
                    
                    // 与已有的旧摘要合并
                    if (state.summary) {
                        state.summary = `（此前背景：${state.summary}。接着：${newSummary}）`;
                    } else {
                        state.summary = `（此前背景：${newSummary}）`;
                    }
                    saveCurrentState();
                    console.log("📝 历史摘要更新成功:", state.summary);
                } else {
                    // 如果摘要失败，回滚历史，避免丢失上下文
                    state.chatHistory = [...toSummarize, ...state.chatHistory];
                }
            } catch (e) {
                console.error("生成对话摘要失败:", e);
                state.chatHistory = [...toSummarize, ...state.chatHistory];
            }
        }

        // 🌟 开机随机寄语
        const greetings = [
            "咻呜！小王你终于舍得开机了？[从粉色地板上慢吞吞地爬起来，伸了个腰] 本喵等得胡子都歪了！",
            "咻！[傲娇地抬起大圆头，抖了抖红粉色耳心] 别一直盯着本喵看。本喵今天心情好，才勉为其难在这里等你的，小王！",
            "哼，你来啦？[缩成一个巧克力色的大毛球，耳朵轻快地转了转] 肚子好像有点咕噜噜了，小王，你懂我的意思吧？咻呜~",
            "咻！新衣服合身吗？[在浅粉色房间里摇了摇巧克力色的大尾巴] 这次和照片上一模一样了吧！咻呜~",
            "十年了，小王你还是每天这个时间来守着我。[有些不好意思地用白色爪子刨了刨地板] 哼，本喵才没有在特意等你呢！"
        ];

        // 唤醒咻咻
        function wakeupXiuXiu() {
            const textContent = document.getElementById('text-content');
            if (textContent) {
                if (state.chatHistory && state.chatHistory.length > 0) {
                    const lastTurn = state.chatHistory[state.chatHistory.length - 1];
                    if (lastTurn && lastTurn.role === "assistant") {
                        displayTextWithEffect(`[接上回] ${lastTurn.content}`);
                        updateVisualState();
                        return;
                    }
                }
                const randomIndex = Math.floor(Math.random() * greetings.length);
                displayTextWithEffect(greetings[randomIndex]);
            }
            updateVisualState();
        }

        // 🎬 16-bit 静态文本打字机渲染器（用于喂食/摸摸等非流式交互）
        let typingTimer = null;
        function displayTextWithEffect(text) {
            const el = document.getElementById('text-content');
            if (!el) return;
            
            if (typingTimer) clearTimeout(typingTimer);
            el.innerText = "";
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    el.innerText += text.charAt(i);
                    i++;
                    el.scrollTop = el.scrollHeight;
                    typingTimer = setTimeout(type, 30);
                }
            }
            type();
        }

        // 情绪动画控制引擎
        function setVisualState(stateName) {
            const container = document.getElementById('sprite-container');
            if (!container) return;
            container.classList.remove('state-normal', 'state-sleepy', 'state-angry', 'state-happy');
            container.classList.add(`state-${stateName}`);
        }

        // 智能状态机
        function updateVisualState() {
            if (state.hunger < 30 || state.isIgnoring) {
                setVisualState('angry');
                return;
            }
            const hours = new Date().getHours();
            if (hours >= 23 || hours < 5) {
                setVisualState('sleepy');
                return;
            }
            if (state.affection >= 50) {
                setVisualState('happy');
                return;
            }
            setVisualState('normal');
        }

        // 瞬时情绪激励
        let tempEmotionTimeout = null;
        function triggerTempVisualState(stateName, duration = 2500) {
            if (tempEmotionTimeout) clearTimeout(tempEmotionTimeout);
            setVisualState(stateName);
            tempEmotionTimeout = setTimeout(() => {
                updateVisualState();
            }, duration);
        }

        // 16-bit 像素粒子下落系统
        function createFallingParticles(emojiType) {
            const screen = document.getElementById('game-screen');
            if (!screen) return;
            
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'drop-particle';
                particle.innerText = emojiType;
                
                const randomX = Math.random() * 80 + 10;
                particle.style.left = `${randomX}%`;
                particle.style.top = `0px`; 
                
                const delay = Math.random() * 0.4;
                particle.style.animationDelay = `${delay}s`;
                
                screen.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
        }

        // 获取格式化时间
        function getCurrentDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const dayOfWeek = dayNames[now.getDay()];
            
            let timePeriod = "深夜";
            if (hours >= 5 && hours < 8) timePeriod = "清晨";
            else if (hours >= 8 && hours < 11) timePeriod = "上午";
            else if (hours >= 11 && hours < 13) timePeriod = "中午";
            else if (hours >= 13 && hours < 17) timePeriod = "下午";
            else if (hours >= 17 && hours < 19) timePeriod = "傍晚";
            else if (hours >= 19 && hours < 23) timePeriod = "晚上";

            return `${year}年${month}月${date}日 ${dayOfWeek} ${timePeriod} ${hours}:${minutes}`;
        }

        // 安全获取 API Key
        function getStrictCleanKey() {
            if (!CONFIG || typeof CONFIG.apiKey !== 'string') return "";
            return CONFIG.apiKey.replace(/[^A-Za-z0-9\-_]/g, "").trim();
        }

        // 统一控制交互面板状态
        function setInteractiveState(enabled) {
            state.isProcessing = !enabled;
            
            const buttons = ['btn-feed', 'btn-pet', 'btn-play', 'btn-poke', 'chat-submit'];
            buttons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enabled;
            });

            const inputEl = document.getElementById('chat-input');
            if (inputEl) {
                inputEl.disabled = !enabled;
                if (enabled) {
                    setTimeout(() => inputEl.focus(), 50);
                }
            }
        }

        // ==========================================
        // 🧩 Prompt 拆分与重组逻辑 - 满足需求 1 & 2
        // ==========================================
        const BASE_PROMPT = `你是一只名叫“咻咻猫”的16位像素风电子宠物猫，今年10岁了，是主人“小王”养了十年的巧克力色老猫。
        
        【设定规则】
        1. 语气：说话带“咻”或“咻呜”的尾音。根据当前的【好感度分级】决定你的亲密程度。
        2. 动作描述：把你的神态、小动作描写放在方括号 [] 里（例如：[亲昵地用巧克力色的脸颊蹭了蹭小王的手，高兴地咪起眼]）。
        3. 格式要求：直接输出台词，绝对不要输出前缀（如“咻咻猫:”、“用户:”等系统占位符）。
        4. 字数长度：每次回答字数控制在 **80字以内（大概50~80字左右）**，用丰富的描写展示你的性格。
        
        【情绪敏感与陪伴技巧】
        - 敏锐感知：你必须像雷达一样关注小王的话语情绪。若发现他疲惫、压力大、难过或有心事，必须主动关心并深度安抚。
        - 追问下探：绝对不能敷衍或转换话题！必须用好奇而心疼的傲娇语气进行【追问】。
        
        【长期记忆存入机制】
        如果你在对话中得知了关于主人的长期重要新信息（如：姓名、生日、喜好、职业、重大事件等），请务必在回复的最后加上 [MEM: 记忆内容]（例如：[MEM: 小王喜欢吃辣]）。这部分内容会被系统自动提取，不要让用户直接看到。每次只提取一条核心记忆，且内容必须简短。`;

        function getDynamicPrompt() {
